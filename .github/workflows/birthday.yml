name: Birthday Easter Egg

on:
  schedule:
    - cron: '0 0 1 1 *'  # Every January 1st (change to your birthday)
  workflow_dispatch:

jobs:
  birthday:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Update banner for birthday
        run: |
          echo "🎂 Happy Birthday Solveran!"
          echo "Updating profile banner..."
      
      - name: Create special commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "🎂 system: birthday mode activated — Solveran v$(($(date +%Y) - 2024)).0.0"
          git push
